---
# =============================================================================
# Ubuntu 24.04 LTS - STIG Pre-Hardening Playbook
# =============================================================================
# Purpose   : Address known STIG failures on a fresh Ubuntu 24.04 install
#             BEFORE OpenSCAP remediation runs, maximizing final compliance score.
# Pipeline  : This playbook runs FIRST, followed by OpenSCAP xccdf generate fix.
# Skipped   : FIPS 140-3 kernel mode (UBTU-24-600030 / V-270744) - requires Ubuntu Pro
#             PIV/Smart card (UBTU-24-400020/030/060/375/380) - requires hardware token
#             SSSD PKI identity mapping (UBTU-24-400370 / V-270736) - ldap_user_certificate is LDAP-
#               only; invalid in [domain/files] and crashes sssd. Configure at deploy time with
#               real LDAP/AD domain replacing the placeholder files domain in sssd.conf.
# Reference : SSG 0.1.79 ssg-ubuntu2404-ds.xml used for scanner-exact values
#             (SSG-shipped Ansible not used directly due to known bugs)
# =============================================================================

- name: Ubuntu 24.04 LTS STIG Pre-Hardening
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - ../inventories/group_vars/all/vault.yml

  vars:
    # -------------------------------------------------------------------------
    # SSH crypto — scanner-exact (FIPS 140-3 approved)
    # WARNING: Do not modify unless you have an AO-approved deviation.
    # -------------------------------------------------------------------------
    # SSH daemon MACs (UBTU-24-100830 / V-270668) — hmac-sha1 variants NOT FIPS approved
    sshd_approved_macs: "hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256"
    # SSH client MACs (UBTU-24-100860 / V-270671)
    ssh_client_approved_macs: "hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256"
    # SSH daemon ciphers (UBTU-24-100820 / V-270667) — no aes192-ctr (not FIPS approved)
    ssh_approved_ciphers: "aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr"
    # SSH client ciphers (UBTU-24-100850 / V-270670)
    ssh_client_approved_ciphers: "aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr"
    # SSH KEX algorithms (UBTU-24-100840 / V-270669) — scanner-exact full list
    ssh_approved_kex: "ecdh-sha2-nistp521,ecdh-sha2-nistp384,ecdh-sha2-nistp256,diffie-hellman-group-exchange-sha256,diffie-hellman-group16-sha512,diffie-hellman-group14-sha256"

    # -------------------------------------------------------------------------
    # Paths (used across multiple sections)
    # -------------------------------------------------------------------------
    audit_log_dir: /var/log/audit
    audit_rules_dir: /etc/audit/rules.d

    # -------------------------------------------------------------------------
    # Secrets (sourced from vault via vars_files above)
    # -------------------------------------------------------------------------
    # Root recovery credential for single-user/maintenance recovery (UBTU-24-102000)
    root_recovery_password: "{{ vault_root_recovery_password | default('CHANGEME_USE_VAULT') }}"
    # Central audit collector for V-270658 remote audit offload
    audispd_remote_server: "{{ vault_audispd_remote_server | default('logcollector') }}"
    # Authoritative NTP server for V-270751 clock synchronization
    ntp_server: "{{ vault_ntp_server | default('0.us.pool.ntp.mil') }}"

    # -------------------------------------------------------------------------
    # PAM / password policy
    # Most values are scanner-exact for Ubuntu 24.04 STIG V1R1.
    # Changing them may cause STIG failures — document any deviation with your AO.
    # -------------------------------------------------------------------------
    pam_pw_minlen: 15               # UBTU-24-300014 — scanner-exact
    pam_pw_difok: 8                 # UBTU-24-300014 — scanner-exact
    pam_password_max_days: 60       # UBTU-24-400310 — scanner-exact
    pam_password_min_days: 1        # UBTU-24-400300 — scanner-exact
    pam_inactive_days: 35           # UBTU-24-200260 — scanner-exact
    pam_max_logins: 10              # UBTU-24-200000 — scanner-exact
    shell_timeout_seconds: 600      # UBTU-24-200060 — scanner-exact (10 minutes)
    faillock_deny: 3                # UBTU-24-200610 — scanner-exact
    faillock_fail_interval: 900     # UBTU-24-300017 — scanner-exact (15-min window)
    faillock_fail_delay: 4          # UBTU-24-300017 — scanner-exact (seconds)

    # -------------------------------------------------------------------------
    # Auditd storage — site-configurable (larger values are STIG-compliant)
    # -------------------------------------------------------------------------
    auditd_max_log_file: 512        # MB per log file
    auditd_num_logs: 5              # number of log files to retain
    auditd_space_left: 75           # MB free before space_left_action triggers

  tasks:
    - name: "1 | Package management"
      ansible.builtin.import_tasks:
        file: tasks/packages.yml
      tags: [packages]

    - name: "2 | SSH daemon hardening"
      ansible.builtin.import_tasks:
        file: tasks/ssh_hardening.yml
      tags: [ssh]

    - name: "3 | PAM and password policy"
      ansible.builtin.import_tasks:
        file: tasks/pam_policy.yml
      tags: [pam]

    - name: "4 | Kernel and system parameters"
      ansible.builtin.import_tasks:
        file: tasks/kernel_params.yml
      tags: [kernel]

    - name: "5 | File permissions and ownership"
      ansible.builtin.import_tasks:
        file: tasks/file_permissions.yml
      tags: [permissions]

    - name: "6 | Audit rules"
      ansible.builtin.import_tasks:
        file: tasks/audit_rules.yml
      tags: [audit]

    - name: "7 | rsyslog"
      ansible.builtin.import_tasks:
        file: tasks/rsyslog.yml
      tags: [rsyslog]

    - name: "8 | AIDE audit tool integrity"
      ansible.builtin.import_tasks:
        file: tasks/aide_integrity.yml
      tags: [aide]

    - name: "9 | Auditd storage and remote logging"
      ansible.builtin.import_tasks:
        file: tasks/auditd_storage.yml
      tags: [audit, auditd]

    - name: "10 | Chrony NTP"
      ansible.builtin.import_tasks:
        file: tasks/ntp.yml
      tags: [ntp]

    - name: "11 | UFW rate limiting"
      ansible.builtin.import_tasks:
        file: tasks/ufw.yml
      tags: [ufw]

    - name: "12 | journald"
      ansible.builtin.import_tasks:
        file: tasks/journald.yml
      tags: [journald]

    - name: "13 | AIDE initialization"
      ansible.builtin.import_tasks:
        file: tasks/aide_init.yml
      tags: [aide]

    - name: "14 | Final cleanup and verification"
      ansible.builtin.import_tasks:
        file: tasks/cleanup.yml
      tags: [cleanup]

  # ---------------------------------------------------------------------------
  # HANDLERS
  # ---------------------------------------------------------------------------
  handlers:
    - name: restart ssh
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    - name: restart rsyslog
      ansible.builtin.systemd:
        name: rsyslog
        state: restarted
