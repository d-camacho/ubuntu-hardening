---
# ============================================================
# os_hardening — Ubuntu 24.04 OS STIG hardening via OpenSCAP
# STIG: Ubuntu 24.04 STIG (DRAFT), SCAP Security Guide v{{ os_stig_ssg_version }}
#
# Execution order:
#   1. install         — openscap-scanner + SSG download (idempotent)
#   2. prescan         — baseline scan for recordkeeping (read-only; skippable)
#   3. remediate       — generate + apply STIG fix script; write sentinel
#   4. post_remediate  — re-apply items OpenSCAP may have clobbered (AIDE, SSH, perms)
#   5. reboot          — fire-and-forget shutdown; play ends cleanly
#
# NOTE: ansible.builtin.reboot is not used — the DoD/USG interactive
# logon consent banner enabled by STIG hardening prevents Ansible from
# reconnecting post-reboot. Post-reboot validation is performed manually
# with DISA SCC to produce the Body of Evidence (BOE) for the AO.
# ============================================================

- name: Install OpenSCAP and SCAP Security Guide
  ansible.builtin.include_tasks: install.yml
  tags: [os_hardening, packages]

- name: Run pre-remediation scan
  ansible.builtin.include_tasks: prescan.yml
  when: os_stig_run_prescan | bool
  tags: [os_hardening, scan]

- name: Apply STIG remediation
  ansible.builtin.include_tasks: remediate.yml
  tags: [os_hardening, remediate]

- name: Post-remediation cleanup (re-apply items OpenSCAP may have clobbered)
  ansible.builtin.include_tasks: post_remediate.yml
  tags: [os_hardening, post_remediate]

- name: Schedule reboot
  ansible.builtin.include_tasks: reboot.yml
  tags: [os_hardening, reboot]
